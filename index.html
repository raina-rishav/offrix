<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offrix | Coming Soon</title>
    <meta name="description" content="Offrix is coming soon. Sign up to get notified when we launch.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    
    <style>
        :root {
            --bg-color: #0b0d19;
            --primary: #6366f1; /* Indigo */
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #a855f7; /* Purple */
            --secondary-glow: rgba(168, 85, 247, 0.5);
            --accent: #06b6d4; /* Cyan */
            --accent-glow: rgba(6, 182, 212, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Animated Background Background Orbs */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            mix-blend-mode: screen;
            animation: float-around 25s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 80%);
            top: -10%;
            left: 10%;
            animation-duration: 20s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 80%);
            bottom: -15%;
            right: 10%;
            animation-duration: 28s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 80%);
            top: 40%;
            right: 25%;
            animation-duration: 22s;
        }

        @keyframes float-around {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(50px, 30px) scale(1.1);
            }
            100% {
                transform: translate(-30px, -50px) scale(0.9);
            }
        }

        /* Container Layout */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 2.5rem;
            margin: 1.5rem;
            z-index: 1;
            text-align: center;
        }

        /* Glassmorphic Card Wrapper */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 var(--glass-highlight);
            position: relative;
            overflow: hidden;
            animation: fade-in-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fade-in-up {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glowing Border Highlight on Card */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
            pointer-events: none;
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        /* Logo / Branding */
        .brand-header {
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 40%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
            position: relative;
        }

        /* Badge Indicator */
        .badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            }
            50% {
                box-shadow: 0 0 10px 4px rgba(99, 102, 241, 0);
            }
        }

        /* Title & Content */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
            max-width: 550px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.6;
        }

        /* Social Icons Section */
        .socials {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-top: 1rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.15rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px) scale(1.1);
        }

        .social-link:hover.twitter { color: #1da1f2; border-color: rgba(29, 161, 242, 0.4); }
        .social-link:hover.github { color: #f0f6fc; border-color: rgba(240, 246, 252, 0.4); }
        .social-link:hover.linkedin { color: #0a66c2; border-color: rgba(10, 102, 194, 0.4); }
        .social-link:hover.discord { color: #5865f2; border-color: rgba(88, 101, 242, 0.4); }

        /* Media Queries for Responsiveness */
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
                margin: 0.5rem;
            }
            .card {
                padding: 2.5rem 1.25rem;
                border-radius: 20px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 1rem;
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient moving background orbs -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="card">
            <!-- Brand Logo -->
            <div class="brand-header">
                <div class="logo">OFFRIX</div>
            </div>

            <!-- Launch badge status -->
            <div class="badge">🚀 Coming Soon</div>

            <!-- Header Content -->
            <h1>Something Amazing <br>is <span>On The Way</span></h1>
            <p class="subtitle">We're developing a state-of-the-art solution to elevate your digital experience. Stay tuned for updates.</p>

            <!-- Social Links Section -->
            <div class="socials">
                <a href="#" class="social-link twitter" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" class="social-link github" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="social-link linkedin" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" class="social-link discord" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
            </div>
        </div>
    </div>
</body>
</html>
